<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>옥텟 규칙 원소 결합 퍼즐 (v3.5 드래그 완성본)</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-area-color: #162447;
            --accent-purple: #8134af;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4rem;
            margin: 10px 0 5px 0;
            text-align: center;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        #reroll-btn {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        #info-board {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #2d142c, #510a32);
            border: 2px solid var(--accent-purple);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        #info-board h2 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #f4d03f;
        }

        #info-board p {
            margin: 0;
            font-size: 0.8rem;
            color: #e0e0e0;
        }

        /* 결합 공간 */
        #bond-zone {
            width: 100%;
            max-width: 400px;
            height: 180px;
            border: 3px dashed var(--accent-purple);
            border-radius: 15px;
            background-color: rgba(22, 36, 71, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            position: relative;
            box-sizing: border-box;
            flex-wrap: wrap;
            padding: 10px;
        }

        .zone-placeholder {
            position: absolute;
            color: #75759e;
            font-size: 0.85rem;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
            z-index: 1;
        }

        /* 원소 카드 보관함 */
        #card-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background-color: var(--card-area-color);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            min-height: 110px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            box-sizing: border-box;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 원소 카드 스타일 (드래그 시 화면 팅김 방지 설정 완료) */
        .element-card {
            width: 62px;
            height: 82px;
            background-color: #ffffff !important;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px 2px;
            cursor: grab;
            user-select: none;
            touch-action: none; /* 모바일 드래그 시 브라우저 스크롤 메커니즘 차단 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
            color: #1a1a2e !important;
            position: relative;
        }

        .element-card:active {
            cursor: grabbing;
        }

        .element-symbol {
            font-size: 1.3rem;
            font-weight: bold;
            pointer-events: none; 
        }

        .electron-dots {
            font-size: 0.65rem;
            color: #e74c3c !important;
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        /* 제어 버튼 */
        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        button.main-btn {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #check-btn { background-color: #2ecc71; }
        #reset-btn { background-color: #e74c3c; }

        /* 결과 팝업창 */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222831;
            border: 2px solid #2ecc71;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            width: 85%; max-width: 320px;
            box-sizing: border-box;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }

        #modal-description {
            color: #eeeeee;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            white-space: pre-line;
            background: #393e46;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>옥텟 규칙 원소 결합 퍼즐<br><span style="font-size:0.9rem; color:#a0a0e0;">(v3.5 하이브리드 드래그 버전)</span></h1>
    
    <div class="status-bar">
        <span id="score-view">해결한 화합물: 0개</span>
        <button id="reroll-btn">원소 무작위 리롤 ↻</button>
    </div>

    <div id="info-board">
        <h2 id="info-title">실시간 원소 결합 시스템</h2>
        <p id="info-sub">원소 카드를 손가락이나 마우스로 끌어서 결합해보세요!</p>
    </div>

    <div id="bond-zone">
        <div class="zone-placeholder" id="placeholder-text">
            원소 카드를 드래그하여 결합 구역에 놓으세요
        </div>
    </div>

    <div id="card-container">
        <div class="element-card" data-element="Na">
            <div class="element-symbol" style="color: #3498db">Na</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" data-element="Cl">
            <div class="element-symbol" style="color: #e67e22">Cl</div>
            <div class="electron-dots">••••••• (7)</div>
        </div>
        <div class="element-card" data-element="H">
            <div class="element-symbol" style="color: #2ecc71">H</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" data-element="H">
            <div class="element-symbol" style="color: #2ecc71">H</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" data-element="O">
            <div class="element-symbol" style="color: #e74c3c">O</div>
            <div class="electron-dots">•••••• (6)</div>
        </div>
    </div>

    <div class="btn-group">
        <button id="check-btn" class="main-btn">화학 결합 검증 실행</button>
        <button id="reset-btn" class="main-btn">원소 회수 (초기화)</button>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="color: #2ecc71; margin-top:0;">결합 성공! 🎉</h2>
        <p id="modal-compound" style="font-size: 1.2rem; font-weight: bold; color: #f4d03f; margin: 5px 0;"></p>
        <div id="modal-description"></div>
        <button onclick="closeModal()" style="background-color: #ef476f; color: white; margin-top: 5px; padding: 12px 0; width:100%; border:none; border-radius:5px; font-weight:bold; cursor:pointer; font-size:1rem;">확인</button>
    </div>

    <script>
        const bondZone = document.getElementById('bond-zone');
        const cardContainer = document.getElementById('card-container');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const rerollBtn = document.getElementById('reroll-btn');
        const placeholderText = document.getElementById('placeholder-text');
        const scoreView = document.getElementById('score-view');
        const modal = document.getElementById('result-modal');
        const overlay = document.getElementById('modal-overlay');

        let solvedCount = 0;

        const elementTemplates = {
            'Na': { symbol: 'Na', dots: '• (1)', color: '#3498db' },
            'Cl': { symbol: 'Cl', dots: '••••••• (7)', color: '#e67e22' },
            'H':  { symbol: 'H',  dots: '• (1)', color: '#2ecc71' },
            'O':  { symbol: 'O',  dots: '•••••• (6)', color: '#e74c3c' },
            'C':  { symbol: 'C',  dots: '•••• (4)', color: '#9b59b6' }
        };

        // --- 🛠️ [핵심 교체] PC 마우스 + 모바일 터치 통합 무적 드래그 엔진 ---
        let activeCard = null;
        let startX = 0, startY = 0;
        let initialX = 0, initialY = 0;

        // 최상위 document 레벨에서 이벤트를 가로채 에러 발생 소지를 원천 차단 (이벤트 위임 기법)
        document.addEventListener('pointerdown', function(e) {
            const card = e.target.closest('.element-card');
            if (!card) return;

            activeCard = card;
            card.style.transition = 'none';
            card.style.zIndex = '1000';

            // 이전 트랜스폼 위치 파악
            const transform = window.getComputedStyle(card).transform;
            if (transform && transform !== 'none') {
                const matrix = new DOMMatrix(transform);
                initialX = matrix.m41;
                initialY = matrix.m42;
            } else {
                initialX = 0; initialY = 0;
            }

            startX = e.clientX;
            startY = e.clientY;
            card.setPointerCapture(e.pointerId);
        });

        document.addEventListener('pointermove', function(e) {
            if (!activeCard) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            activeCard.style.transform = `translate(${initialX + dx}px, ${initialY + dy}px)`;
        });

        document.addEventListener('pointerup', function(e) {
            if (!activeCard) return;
            const card = activeCard;
            activeCard = null;
            card.releasePointerCapture(e.pointerId);

            card.style.transition = 'all 0.15s ease';
            card.style.zIndex = '2';

            // 마우스/손가락이 멈춘 물리 좌표 기반 드롭존 판정 알고리즘
            const bondRect = bondZone.getBoundingClientRect();
            const x = e.clientX;
            const y = e.clientY;

            card.style.transform = 'none'; // 레이아웃 정렬을 위해 초기화

            if (x >= bondRect.left && x <= bondRect.right && y >= bondRect.top && y <= bondRect.bottom) {
                bondZone.appendChild(card);
            } else {
                cardContainer.appendChild(card);
            }
            togglePlaceholder();
        });

        function togglePlaceholder() {
            placeholderText.style.display = bondZone.querySelectorAll('.element-card').length > 0 ? 'none' : 'block';
        }

        // 무작위 리롤 시스템
        function rerollElements() {
            cardContainer.innerHTML = '';
            bondZone.querySelectorAll('.element-card').forEach(c => c.remove());
            togglePlaceholder();

            const recipes = [
                ['Na', 'Cl', 'H', 'H', 'O', 'C'],
                ['H', 'H', 'O', 'H', 'H', 'O'],
                ['Na', 'Cl', 'Na', 'Cl', 'O', 'H'],
                ['C', 'O', 'O', 'H', 'H', 'O']
            ];
            
            const chosen = [...recipes[Math.floor(Math.random() * recipes.length)]];
            for (let i = chosen.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [chosen[i], chosen[j]] = [chosen[j], chosen[i]];
            }

            chosen.forEach(elType => {
                const data = elementTemplates[elType];
                if(!data) return;
                const card = document.createElement('div');
                card.className = 'element-card';
                card.setAttribute('data-element', elType);
                card.innerHTML = `
                    <div class="element-symbol" style="color: ${data.color}">${data.symbol}</div>
                    <div class="electron-dots">${data.dots}</div>
                `;
                cardContainer.appendChild(card);
            });
        }

        // 검증 로직
        checkBtn.addEventListener('click', () => {
            const currentCards = Array.from(bondZone.querySelectorAll('.element-card'));
            const elements = currentCards.map(card => card.getAttribute('data-element'));
            
            const counts = {};
            elements.forEach(el => counts[el] = (counts[el] || 0) + 1);

            if (counts['Na'] === 1 && counts['Cl'] === 1 && elements.length === 2) {
                successProcess("염화나트륨 (NaCl)", 
                    "[이온 결합]\n나트륨(Na)의 최외각 전자 1개가 염소(Cl) 쪽으로 완전히 이동하면서 두 이온 모두 최외각 전자 8개를 채워 강한 정전기적 인력으로 결합합니다.\n\n[일상 속 쓰임새]\n우리가 매일 먹는 소금의 주성분이며 체내 전해질 수치를 조절합니다.");
            } 
            else if (counts['H'] === 2 && counts['O'] === 1 && elements.length === 3) {
                successProcess("물 (H₂O)", 
                    "[공유 결합]\n산소(O)가 부족한 전자 2개를 채우기 위해 수소(H) 원자 2개와 전자쌍을 공유함으로써 모두 안정된 규칙을 이룹니다.\n\n[일상 속 쓰임새]\n지구 생명체의 생명 유지 및 신진대사를 돕는 생명의 원천 물질입니다.");
            }
            else if (counts['C'] === 1 && counts['O'] === 2 && elements.length === 3) {
                successProcess("이산화탄소 (CO₂)", 
                    "[공유 결합]\n탄소(C) 원자 1개가 좌우의 산소(O) 원자 2개와 각각 전자쌍 2개씩을 공유하여 이중 결합을 형성하고 옥텟 규칙을 만족합니다.\n\n[일상 속 쓰임새]\n식물의 광합성 작용 원료이며 탄산음료 및 소화기에 다양하게 활용됩니다.");
            }
            else {
                alert("옥텟 규칙 불일치! 원소들의 결합 조건이 비활성 기체의 전자 배치 상태를 만족하지 못했습니다.");
            }
        });

        function successProcess(compound, text) {
            solvedCount++;
            scoreView.innerText = `해결한 화합물: ${solvedCount}개`;
            document.getElementById('modal-compound').innerText = compound;
            document.getElementById('modal-description').innerText = text;
            modal.style.display = 'block';
            overlay.style.display = 'block';
        }

        resetBtn.addEventListener('click', () => {
            bondZone.querySelectorAll('.element-card').forEach(c => cardContainer.appendChild(c));
            togglePlaceholder();
        });

        rerollBtn.addEventListener('click', rerollElements);

        function closeModal() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
            rerollElements();
        }
        
        togglePlaceholder();
    </script>
</body>
</html>
