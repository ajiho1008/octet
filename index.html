<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>옥텟 규칙 원소 결합 퍼즐 (v3.0 안심 버전)</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-area-color: #162447;
            --accent-purple: #8134af;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4rem;
            margin: 10px 0 5px 0;
            text-align: center;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        #reroll-btn {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        #info-board {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #2d142c, #510a32);
            border: 2px solid var(--accent-purple);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        #info-board h2 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #f4d03f;
        }

        #info-board p {
            margin: 0;
            font-size: 0.8rem;
            color: #e0e0e0;
        }

        /* 결합 공간 */
        #bond-zone {
            width: 100%;
            max-width: 400px;
            height: 180px;
            border: 3px dashed var(--accent-purple);
            border-radius: 15px;
            background-color: rgba(22, 36, 71, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            position: relative;
            box-sizing: border-box;
            flex-wrap: wrap;
            padding: 10px;
        }

        .zone-placeholder {
            position: absolute;
            color: #75759e;
            font-size: 0.85rem;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
            z-index: 1;
        }

        /* 원소 카드 보관함 */
        #card-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background-color: var(--card-area-color);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            min-height: 110px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            box-sizing: border-box;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 원소 카드 스타일 (절대 안 깨지도록 색상 강제 명시) */
        .element-card {
            width: 62px;
            height: 82px;
            background-color: #ffffff !important;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px 2px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
            color: #1a1a2e !important; /* 글자색 묻힘 방지 */
        }

        .element-symbol {
            font-size: 1.3rem;
            font-weight: bold;
            pointer-events: none; /* 클릭 타겟 에러 방지 */
        }

        .electron-dots {
            font-size: 0.65rem;
            color: #e74c3c !important;
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        /* 제어 버튼 */
        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        button.main-btn {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #check-btn { background-color: #2ecc71; }
        #reset-btn { background-color: #e74c3c; }

        /* 결과 팝업창 */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222831;
            border: 2px solid #2ecc71;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 100;
            text-align: center;
            width: 85%; max-width: 320px;
            box-sizing: border-box;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 99;
        }

        #modal-description {
            color: #eeeeee;
            font-size: 0.85rem;
            line-height: 1.5;
            text-align: left;
            white-space: pre-line;
            background: #393e46;
            padding: 10px;
            border-radius: 6px;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <h1>옥텟 규칙 원소 결합 퍼즐<br><span style="font-size:0.9rem; color:#a0a0e0;">(v3.0 실시간 안심 버전)</span></h1>
    
    <div class="status-bar">
        <span id="score-view">해결한 화합물: 0개</span>

    <div id="info-board">

        <p id="info-sub">원소 카드를 터치하거나 클릭하면 이동합니다!</p>
    </div>

    <div id="bond-zone">
        <div class="zone-placeholder" id="placeholder-text">
            원소 카드를 터치하여 결합 구역으로 이동하세요

    </div>

    <div id="card-container">

        <div class="element-card" data-element="H">
            <div class="element-symbol" style="color: #2ecc71">H</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" data-element="H">
            <div class="element-symbol" style="color: #2ecc71">H</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" data-element="O">
            <div class="element-symbol" style="color: #e74c3c">O</div>
            <div class="electron-dots">•••••• (6)</div>
        </div>
    </div>

    <div class="btn-group">
        <button id="check-btn" class="main-btn">화학 결합 검증 실행</button>
        <button id="reset-btn" class="main-btn">원소 회수 (초기화)</button>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="color: #2ecc71; margin-top:0;">결합 성공! 🎉</h2>
        <p id="modal-compound" style="font-size: 1.2rem; font-weight: bold; color: #f4d03f; margin: 5px 0;"></p>
        <div id="modal-description"></div>
