<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>옥텟 규칙 마스터! 하드코어 원소 결합 퍼즐</title>
    <style>
        :root {
            --primary: #34495e;
            --accent: #9b59b6;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #1a1a24;
            --card-bg: #2c3e50;
        }

        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            color: #ecf0f1;
            margin: 10px 0 5px 0;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 800;
        }

        /* 스코어 및 목표 화합물 인터페이스 */
        #status-bar {
            display: flex;
            justify-content: space-between;
            width: 95%;
            max-width: 600px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #bdc3c7;
        }

        #target-box {
            width: 95%;
            max-width: 600px;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        #target-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 5px;
        }

        #target-hint {
            font-size: 0.85rem;
            color: #bdc3c7;
            line-height: 1.4;
        }

        /* 결합 실험실 공간 */
        #bond-zone {
            width: 95%;
            max-width: 600px;
            height: 200px;
            border: 3px dashed var(--accent);
            border-radius: 20px;
            background-color: #24252f;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            flex-wrap: wrap;
            padding: 10px;
            box-sizing: border-box;
        }

        #bond-zone::before {
            content: "원소 카드를 드래그하여 결합(여기에 드롭)";
            position: absolute;
            color: #5f6277;
            font-size: 0.9rem;
            font-weight: bold;
            pointer-events: none;
            top: 45%;
        }

        #bond-zone.has-items::before {
            opacity: 0;
        }

        /* 하단 인벤토리 영역 */
        #card-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #111217;
            padding: 12px;
            border-radius: 16px;
            width: 95%;
            max-width: 600px;
            justify-content: center;
            min-height: 110px;
            flex-wrap: wrap;
            border: 1px solid #2c2d35;
        }

        /* 하드코어 원소 카드 스타일 (다크 테마) */
        .element-card {
            width: 62px;
            height: 88px;
            background: var(--card-bg);
            border: 2px solid #455a64;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px 2px;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            touch-action: none;
            box-sizing: border-box;
        }

        .element-card.dragging {
            opacity: 0.4;
            transform: scale(1.05);
        }

        .atomic-number {
            font-size: 0.7rem;
            color: #95a5a6;
            align-self: flex-start;
            margin-left: 4px;
            font-weight: bold;
        }

        .element-symbol {
            font-size: 1.3rem;
            font-weight: 800;
            color: #ffffff;
            margin-top: -4px;
        }

        .electron-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            width: 95%;
            min-height: 14px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background-color: #e74c3c;
            border-radius: 50%;
        }

        /* 버튼 컨트롤 */
        .btn-group {
            display: flex;
            gap: 15px;
            width: 95%;
            max-width: 600px;
        }

        button {
            flex: 1;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            color: white;
            transition: background 0.2s;
        }

        #check-btn { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        #reset-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); }

        /* 결과 안내 팝업 모달 */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 99;
        }

        #result-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2c3e50;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100;
            text-align: center;
            width: 85%;
            max-width: 380px;
            border: 2px solid var(--success);
        }

        #modal-compound {
            font-size: 1.4rem;
            color: #f1c40f;
            background: #1a1a24;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 10px 0;
            font-weight: bold;
        }

        #modal-description {
            color: #ecf0f1;
            line-height: 1.5;
            font-size: 0.9rem;
            text-align: left;
            white-space: pre-line;
            background: #233342;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .close-btn { background: #7f8c8d; color: white; width: 100%; margin-top: 15px; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <h1>옥텟 규칙 원소 결합 퍼즐 (Hardcore v2.0)</h1>
    
    <div id="status-bar">
        <span id="score-count">해결한 화합물: 0개</span>
        <span>주기율표 무작위 리롤 시스템</span>
    </div>

    <div id="target-box">
        <div id="target-name">화합물 불러오는 중...</div>
        <div id="target-hint">힌트 데이터 분석 중...</div>
    </div>

    <div id="bond-zone"></div>
    <div id="card-container"></div>

    <div class="btn-group">
        <button id="check-btn">화학 결합 검증 실행</button>
        <button id="reset-btn">원소 회수 (초기화)</button>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 style="color: var(--success); margin-top:0;">결합 구조 검증 성공! ⚗️</h2>
        <div id="modal-compound"></div>
        <div id="modal-description"></div>
        <button class="close-btn" id="next-stage-btn">다음 무작위 난제 풀기</button>
    </div>
