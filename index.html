<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>옥텟 규칙을 만족하라! 원소 결합 퍼즐 게임</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        /* 결합 공간 (대형 대시보드 형태) */
        #bond-zone {
            width: 80%;
            max-width: 700px;
            height: 300px;
            border: 3px dashed #3498db;
            border-radius: 15px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #bond-zone::before {
            content: "여기에 원소 카드를 드래그하여 결합하세요";
            position: absolute;
            color: #bdc3c7;
            font-size: 1.1rem;
            z-index: 0;
            pointer-events: none;
        }

        /* 하단 카드 정렬 영역 */
        #card-container {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            background: #e2e8f0;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 700px;
            justify-content: center;
        }

        /* 원소 카드 스타일 */
        .element-card {
            width: 80px;
            height: 100px;
            background-color: #ffffff;
            border: 2px solid #7f8c8d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
            position: relative;
            z-index: 1;
            transition: transform 0.2s;
        }

        .element-card:active {
            cursor: grabbing;
        }

        .element-symbol {
            font-size: 1.8rem;
            font-weight: bold;
            color: #2c3e50;
        }

        /* 최외각 전자 (점) 시각화 */
        .electron-dots {
            font-size: 0.8rem;
            color: #e74c3c;
            letter-spacing: 2px;
            font-weight: bold;
        }

        /* 버튼 영역 */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #check-btn { background-color: #2ecc71; color: white; }
        #check-btn:hover { background-color: #27ae60; }
        #reset-btn { background-color: #e74c3c; color: white; }
        #reset-btn:hover { background-color: #c0392b; }

        /* 결과창 및 모달 효과 */
        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 10;
            text-align: center;
            width: 350px;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 5;
        }

        .success-effect {
            animation: celebrate 0.5s ease alternate infinite;
        }

        @keyframes celebrate {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>

    <h1>옥텟 규칙 원소 결합 퍼즐</h1>
    <p>원소를 결합 공간에 끌어다 놓고 옥텟 규칙을 만족하는 화합물($\text{NaCl}$, $\text{H}_2\text{O}$)을 만들어보세요!</p>

    <div id="bond-zone"></div>

    <div id="card-container">
        <div class="element-card" draggable="true" data-element="Na" data-electrons="1">
            <div class="element-symbol">Na</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" draggable="true" data-element="Cl" data-electrons="7">
            <div class="element-symbol">Cl</div>
            <div class="electron-dots">••••••• (7)</div>
        </div>
        <div class="element-card" draggable="true" data-element="H" data-electrons="1">
            <div class="element-symbol">H</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" draggable="true" data-element="H" data-electrons="1">
            <div class="element-symbol">H</div>
            <div class="electron-dots">• (1)</div>
        </div>
        <div class="element-card" draggable="true" data-element="O" data-electrons="6">
            <div class="element-symbol">O</div>
            <div class="electron-dots">•••••• (6)</div>
        </div>
    </div>

    <div class="btn-group">
        <button id="check-btn">결합 확인</button>
        <button id="reset-btn">초기화</button>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="color: #2ecc71;">결합 성공! 🎉</h2>
        <p id="modal-compound" style="font-size: 1.3rem; font-weight: bold;"></p>
        <p id="modal-description" style="color: #555; line-height: 1.5;"></p>
        <button onclick="closeModal()" style="background-color: #34495e; color: white; margin-top: 15px;">닫기</button>
    </div>

    <script>
        const bondZone = document.getElementById('bond-zone');
        const cardContainer = document.getElementById('card-container');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const modal = document.getElementById('result-modal');
        const overlay = document.getElementById('modal-overlay');

        let draggedCard = null;

        // --- 드래그 앤 드롭 구현 ---
        document.querySelectorAll('.element-card').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                draggedCard = card;
                card.style.opacity = '0.5';
            });

            card.addEventListener('dragend', () => {
                card.style.opacity = '1';
                draggedCard = null;
            });
        });

        bondZone.addEventListener('dragover', (e) => {
            e.preventDefault(); // 드롭 허용
        });

        bondZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (draggedCard) {
                bondZone.appendChild(draggedCard);
                checkZoneEmpty();
            }
        });

        cardContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        cardContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            if (draggedCard) {
                cardContainer.appendChild(draggedCard);
                checkZoneEmpty();
            }
        });

        // 결합 공간 글씨 가리기 제어
        function checkZoneEmpty() {
            if (bondZone.children.length > 0) {
                bondZone.style.background = "#fff8f8";
            } else {
                bondZone.style.background = "#ffffff";
            }
        }

        // --- 결합 판정 알고리즘 (옥텟 규칙 및 화합물 검사) ---
        checkBtn.addEventListener('click', () => {
            const currentCards = Array.from(bondZone.children);
            const elements = currentCards.map(card => card.getAttribute('data-element'));
            
            // 원소 개수 카운트
            const counts = {};
            elements.forEach(el => counts[el] = (counts[el] || 0) + 1);

            // 1. 이온 결합 판정: NaCl (Na 1개, Cl 1개)
            if (counts['Na'] === 1 && counts['Cl'] === 1 && elements.length === 2) {
                showSuccess(
                    "염화나트륨(NaCl)", 
                    "이온 결합 화합물: 나트륨(Na)의 전자 1개가 염소(Cl)로 완전히 이동하여 두 원소 모두 옥텟 규칙을 만족합니다.\n\n[일상 속 쓰임새]\n우리가 매일 먹는 '소금'의 주성분이며, 음식의 간을 맞추거나 식품을 보존할 때 필수적으로 사용됩니다."
                );
            } 
            // 2. 공유 결합 판정: H2O (H 2개, O 1개)
            else if (counts['H'] === 2 && counts['O'] === 1 && elements.length === 3) {
                showSuccess(
                    "물(H₂O)", 
                    "공유 결합 화합물: 산소(O)가 2개의 수소(H) 원자와 각각 전자를 쌍으로 공유하여, 수소는 2개, 산소는 8개의 최외각 전자를 가집니다.\n\n[일상 속 쓰임새]\n지구 생명체의 유지에 필수적인 '물'입니다. 생명체의 체온 조절, 물질 순환 및 생체 내 화학 반응의 매개체 역할을 합니다."
                );
            } 
            // 3. 결합 실패 및 오답 판정
            else {
                alert("옥텟 규칙을 만족하지 않거나 올바르지 않은 화합물 조합입니다. 다시 시도해보세요!");
            }
        });

        // --- 초기화 기능 ---
        resetBtn.addEventListener('click', () => {
            const cards = Array.from(bondZone.children);
            cards.forEach(card => cardContainer.appendChild(card));
            checkZoneEmpty();
        });

        // --- 모달 팝업 제어 ---
        function showSuccess(compound, description) {
            document.getElementById('modal-compound').innerText = compound;
            document.getElementById('modal-description').innerText = description;
            
            modal.style.display = 'block';
            overlay.style.display = 'block';
            modal.classList.add('success-effect');
        }

        function closeModal() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
            modal.classList.remove('success-effect');
        }
    </script>
</body>
</html>
