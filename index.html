<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>옥텟 규칙 원소 결합 퍼즐 (v5.1 버그 수정 최종판)</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-area-color: #162447;
            --accent-purple: #8134af;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        h1 {
            font-size: 1.3rem;
            margin: 5px 0 2px 0;
            text-align: center;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 430px;
            font-size: 0.8rem;
            color: #b3b3b3;
            margin-bottom: 8px;
            padding: 0 5px;
        }

        #info-board {
            width: 100%;
            max-width: 430px;
            background: linear-gradient(135deg, #2d142c, #510a32);
            border: 2px solid var(--accent-purple);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        #info-board h2 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            color: #f4d03f;
        }

        #info-board p {
            margin: 0;
            font-size: 0.85rem;
            color: #e0e0e0;
            line-height: 1.4;
            word-break: keep-all;
            letter-spacing: 0.5px;
        }

        #bond-zone {
            width: 100%;
            max-width: 430px;
            height: 180px;
            border: 3px dashed var(--accent-purple);
            border-radius: 15px;
            background-color: rgba(22, 36, 71, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            position: relative;
            box-sizing: border-box;
            flex-wrap: wrap;
            padding: 8px;
        }

        .zone-placeholder {
            position: absolute;
            color: #75759e;
            font-size: 0.8rem;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #card-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 15px;
            background-color: var(--card-area-color);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            max-width: 430px;
            box-sizing: border-box;
        }

        .element-card {
            background-color: #ffffff;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px 2px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            box-sizing: border-box;
            aspect-ratio: 1 / 1.25;
            touch-action: none;
            transition: transform 0.1s;
        }

        .element-card:active {
            transform: scale(0.92);
        }

        .element-symbol {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a2e;
            margin-top: 2px;
            pointer-events: none;
        }

        .electron-dots {
            font-size: 0.6rem;
            color: #e74c3c;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
            pointer-events: none;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 430px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #check-btn { background-color: #2ecc71; }
        #reset-btn { background-color: #e74c3c; }

        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222831;
            border: 2px solid #2ecc71;
            padding: 18px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1010;
            text-align: center;
            width: 85%;
            max-width: 340px;
            box-sizing: border-box;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1005;
        }

        #modal-description {
            color: #eeeeee;
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: left;
            white-space: pre-line;
            background: #393e46;
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>옥텟 규칙 원소 결합 퍼즐</h1>
    
    <div class="status-bar">
        <span id="score-view">해결한 화합물: 0개 / 9개</span>
        <span>UI 수정 및 염소 카드 버그 픽스 완료</span>
    </div>

    <div id="info-board">
        <h2>미션: 9가지 화합물을 완성하세요!</h2>
        <p>물, 소금, 이산화탄소, 메테인, 염화수소, 암모니아, 산소, 수소, 염소</p>
    </div>

    <div id="bond-zone">
        <div class="zone-placeholder" id="placeholder-text">
            원소를 '클릭'하거나 '드래그'하여 넣으세요
        </div>
    </div>

    <div id="card-container">
        <div class="element-card" data-element="H"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        <div class="element-card" data-element="H"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        <div class="element-card" data-element="H"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        <div class="element-card" data-element="H"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        
        <div class="element-card" data-element="C"><div class="element-symbol">C</div><div class="electron-dots">•••• (4)</div></div>
        
        <div class="element-card" data-element="N"><div class="element-symbol">N</div><div class="electron-dots">••••• (5)</div></div>

        <div class="element-card" data-element="O"><div class="element-symbol">O</div><div class="electron-dots">•••••• (6)</div></div>
        <div class="element-card" data-element="O"><div class="element-symbol">O</div><div class="electron-dots">•••••• (6)</div></div>
        
        <div class="element-card" data-element="Na"><div class="element-symbol">Na</div><div class="electron-dots">• (1)</div></div>
        
        <div class="element-card" data-element="Cl"><div class="element-symbol">Cl</div><div class="electron-dots">••••••• (7)</div></div>
        <div class="element-card" data-element="Cl"><div class="element-symbol">Cl</div><div class="electron-dots">••••••• (7)</div></div>
    </div>

    <div class="btn-group">
        <button id="check-btn">화학 결합 검증 실행</button>
        <button id="reset-btn">원소 회수 (초기화)</button>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="color: #2ecc71; margin-top:0;">결합 성공! 🎉</h2>
        <p id="modal-compound" style="font-size: 1.1rem; font-weight: bold; color: #f4d03f; margin: 3px 0;"></p>
        <div id="modal-description"></div>
        <button onclick="closeModal()" style="background-color: #ef476f; color: white; margin-top: 5px; padding: 8px 0; width:100%;">확인</button>
    </div>

    <script>
        const bondZone = document.getElementById('bond-zone');
        const cardContainer = document.getElementById('card-container');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const placeholderText = document.getElementById('placeholder-text');
        const scoreView = document.getElementById('score-view');
        const modal = document.getElementById('result-modal');
        const overlay = document.getElementById('modal-overlay');

        let solvedCount = 0;
        const solvedList = new Set();

        function togglePlaceholder() {
            const currentElements = bondZone.querySelectorAll('.element-card');
            placeholderText.style.display = currentElements.length > 0 ? 'none' : 'block';
        }

        let activeCard = null;
        let startX = 0, startY = 0;
        let initialX = 0, initialY = 0;
        let isMoved = false;

        document.querySelectorAll('.element-card').forEach(card => {
            card.addEventListener('click', () => {
                if (isMoved) return;
                if (card.parentElement === cardContainer) {
                    bondZone.appendChild(card);
                } else {
                    cardContainer.appendChild(card);
                }
                togglePlaceholder();
            });

            card.setAttribute('draggable', 'true');
            card.addEventListener('dragstart', (e) => {
                activeCard = card;
            });

            card.addEventListener('touchstart', (e) => {
                activeCard = card;
                isMoved = false;
                const touch = e.touches[0];
                const rect = card.getBoundingClientRect();
                
                startX = touch.clientX;
                startY = touch.clientY;
                initialX = rect.left;
                initialY = rect.top;
            }, { passive: true });

            card.addEventListener('touchmove', (e) => {
                if (!activeCard) return;
                const touch = e.touches[0];
                const dx = touch.clientX - startX;
                const dy = touch.clientY - startY;
                
                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    isMoved = true;
                    if (card.style.position !== 'fixed') {
                        const rect = card.getBoundingClientRect();
                        card.style.width = rect.width + 'px';
                        card.style.height = rect.height + 'px';
                        card.style.position = 'fixed';
                        card.style.zIndex = '1000';
                        card.style.pointerEvents = 'none';
                    }
                    card.style.left = (initialX + dx) + 'px';
                    card.style.top = (initialY + dy) + 'px';
                }
            }, { passive: false });

            card.addEventListener('touchend', (e) => {
                if (!activeCard) return;
                
                if (isMoved) {
                    card.style.position = '';
                    card.style.left = '';
                    card.style.top = '';
                    card.style.zIndex = '';
                    card.style.width = '';
                    card.style.height = '';
                    card.style.pointerEvents = '';

                    const touch = e.changedTouches[0];
                    const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                    
                    if (dropTarget) {
                        const zone = dropTarget.closest('#bond-zone');
                        if (zone) {
                            bondZone.appendChild(card);
                        } else {
                            cardContainer.appendChild(card);
                        }
                    } else {
                        cardContainer.appendChild(card);
                    }
                    
                    setTimeout(() => { isMoved = false; }, 50);
                }
                activeCard = null;
                togglePlaceholder();
            });
        });

        bondZone.addEventListener('dragover', (e) => e.preventDefault());
        bondZone.addEventListener('drop', (e) => {
            e.preventDefault();
            if (activeCard) { bondZone.appendChild(activeCard); togglePlaceholder(); activeCard = null; }
        });

        cardContainer.addEventListener('dragover', (e) => e.preventDefault());
        cardContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            if (activeCard) { cardContainer.appendChild(activeCard); togglePlaceholder(); activeCard = null; }
        });

        checkBtn.addEventListener('click', () => {
            const currentCards = Array.from(bondZone.querySelectorAll('.element-card'));
            const elements = currentCards.map(card => card.getAttribute('data-element'));
            const counts = {};
            elements.forEach(el => counts[el] = (counts[el] || 0) + 1);
            const total = elements.length;

            if (counts['Na'] === 1 && counts['Cl'] === 1 && total === 2) {
                successProcess("염화나트륨 (NaCl)", "[이온 결합]\n나트륨의 최외각 전자 1개가 염소로 이동하여 각각 양이온과 음이온이 되며 결합합니다.\n\n[일상 쓰임새]\n우리가 먹는 음식의 핵심 조미료인 소금입니다.");
            } 
            else if (counts['H'] === 2 && counts['O'] === 1 && total === 3) {
                successProcess("물 (H₂O)", "[공유 결합]\n산소 원자 1개가 수소 원자 2개와 각각 전자 1쌍씩을 공유하여 단일 결합을 이룹니다.\n\n[일상 쓰임새]\n지구 생명체 유지에 필수적인 물입니다.");
            } 
            else if (counts['C'] === 1 && counts['O'] === 2 && total === 3) {
                successProcess("이산화탄소 (CO₂)", "[공유 결합]\n탄소 1개가 산소 2개와 각각 2쌍의 전자를 공유하는 '이중 결합'을 형성합니다.\n\n[일상 쓰임새]\n식물의 광합성 원료 및 탄산음료에 쓰입니다.");
            }
            else if (counts['C'] === 1 && counts['H'] === 4 && total === 5) {
                successProcess("메테인 (CH₄)", "[공유 결합]\n탄소가 사방으로 수소 4개와 전자를 공유해 완벽한 정사면체 구조를 이룹니다.\n\n[일상 쓰임새]\n가정용 도시가스(LNG)의 주성분입니다.");
            }
            else if (counts['H'] === 1 && counts['Cl'] === 1 && total === 2) {
                successProcess("염화수소 (HCl)", "[공유 결합]\n수소와 염소가 전자 1쌍을 공유합니다. 물에 녹으면 강산인 염산이 됩니다.\n\n[일상 쓰임새]\n우리 위장에서 분비되는 위산의 주성분입니다.");
            }
            else if (counts['N'] === 1 && counts['H'] === 3 && total === 4) {
                successProcess("암모니아 (NH₃)", "[공유 결합]\n질소 원자가 3개의 수소 원자와 전자쌍을 공유하여 삼각뿔 형태를 만듭니다.\n\n[일상 쓰임새]\n농업용 비료 및 정밀 화학 제품의 원료입니다.");
            }
            else if (counts['O'] === 2 && total === 2) {
                successProcess("산소 기체 (O₂)", "[공유 결합]\n산소 원자 2개가 서로 전자 2쌍을 공유하여 강력한 이중 결합을 형성합니다.\n\n[일상 쓰임새]\n생명체의 호흡에 필수적인 기체입니다.");
            }
            else if (counts['H'] === 2 && total === 2) {
                successProcess("수소 기체 (H₂)", "[공유 결합]\n수소 원자 2개가 전자 1쌍을 공유하여 안정된 분자 껍질을 만듭니다.\n\n[일상 쓰임새]\n우주선 연료 및 미래 친환경 수소차의 에너지원입니다.");
            }
            else if (counts['Cl'] === 2 && total === 2) {
                successProcess("염소 기체 (Cl₂)", "[공유 결합]\n염소 원자 2개가 전자 1쌍을 공유하여 옥텟 규칙을 만족합니다.\n\n[일상 쓰임새]\n수돗물 소독 및 수영장 물을 살균할 때 쓰입니다.");
            }
            else {
                alert("❌ 조립 실패!\n목표 화합물 9종의 힌트를 확인하시고, 알맞은 개수의 카드를 올려주세요.");
            }
        });

        function successProcess(compound, text) {
            if (!solvedList.has(compound)) {
                solvedList.add(compound);
                solvedCount = solvedList.size;
                scoreView.innerText = `해결한 화합물: ${solvedCount}개 / 9개`;
            }
            document.getElementById('modal-compound').innerText = compound;
            document.getElementById('modal-description').innerText = text;
            modal.style.display = 'block';
            overlay.style.display = 'block';
        }

        resetBtn.addEventListener('click', () => {
            const cards = Array.from(bondZone.querySelectorAll('.element-card'));
            cards.forEach(card => cardContainer.appendChild(card));
            togglePlaceholder();
        });

        function closeModal() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
            resetBtn.click();
        }
    </script>
</body>
</html>
