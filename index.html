<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>옥텟 규칙 원소 결합 퍼즐 (v4.0 9종 마스터판)</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-area-color: #162447;
            --accent-purple: #8134af;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.3rem;
            margin: 5px 0 2px 0;
            text-align: center;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 430px;
            font-size: 0.8rem;
            color: #b3b3b3;
            margin-bottom: 8px;
            padding: 0 5px;
        }

        #info-board {
            width: 100%;
            max-width: 430px;
            background: linear-gradient(135deg, #2d142c, #510a32);
            border: 2px solid var(--accent-purple);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        #info-board h2 {
            margin: 0 0 3px 0;
            font-size: 1rem;
            color: #f4d03f;
        }

        #info-board p {
            margin: 0;
            font-size: 0.75rem;
            color: #e0e0e0;
            line-height: 1.3;
        }

        #bond-zone {
            width: 100%;
            max-width: 430px;
            height: 180px;
            border: 3px dashed var(--accent-purple);
            border-radius: 15px;
            background-color: rgba(22, 36, 71, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            position: relative;
            box-sizing: border-box;
            flex-wrap: wrap;
            padding: 8px;
        }

        .zone-placeholder {
            position: absolute;
            color: #75759e;
            font-size: 0.8rem;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #card-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 15px;
            background-color: var(--card-area-color);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            max-width: 430px;
            box-sizing: border-box;
        }

        .element-card {
            background-color: #ffffff;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 5px 2px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            box-sizing: border-box;
            aspect-ratio: 1 / 1.25;
        }

        .element-card:active {
            transform: scale(0.95);
        }

        .element-symbol {
            font-size: 1.2rem;
            font-weight: bold;
            color: #1a1a2e;
            margin-top: 2px;
        }

        .electron-dots {
            font-size: 0.6rem;
            color: #e74c3c;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2px;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 430px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        #check-btn { background-color: #2ecc71; }
        #reset-btn { background-color: #e74c3c; }

        #result-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #222831;
            border: 2px solid #2ecc71;
            padding: 18px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 10;
            text-align: center;
            width: 85%;
            max-width: 340px;
            box-sizing: border-box;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 5;
        }

        #modal-description {
            color: #eeeeee;
            font-size: 0.85rem;
            line-height: 1.4;
            text-align: left;
            white-space: pre-line;
            background: #393e46;
            padding: 8px;
            border-radius: 6px;
            margin: 8px 0;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>옥텟 규칙 원소 결합 퍼즐<br><span style="font-size:0.95rem; color:#a0a0e0;">(화합물 9종 마스터 버전)</span></h1>
    
    <div class="status-bar">
        <span id="score-view">해결한 화합물: 0개 / 9개</span>
        <span>최적화 격자 시스템 가동</span>
    </div>

    <div id="info-board">
        <h2>미션: 아래 9가지 화합물을 완성하세요!</h2>
        <p>물, 소금, 이산화탄소, 메테인, 염화수소, 암모니아, 산소 기체, 수소 기체, 염소 기체</p>
    </div>

    <div id="bond-zone">
        <div class="zone-placeholder" id="placeholder-text">
            원소를 터치하여 결합 공간에 넣으세요
        </div>
    </div>

    <div id="card-container">
        <div class="element-card" data-element="H" onclick="moveCard(this)"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        <div class="element-card" data-element="H" onclick="moveCard(this)"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        <div class="element-card" data-element="H" onclick="moveCard(this)"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        <div class="element-card" data-element="H" onclick="moveCard(this)"><div class="element-symbol">H</div><div class="electron-dots">• (1)</div></div>
        
        <div class="element-card" data-element="C" onclick="moveCard(this)"><div class="element-symbol">C</div><div class="electron-dots">•••• (4)</div></div>
        
        <div class="element-card" data-element="N" onclick="moveCard(this)"><div class="element-symbol">N</div><div class="electron-dots">••••• (5)</div></div>

        <div class="element-card" data-element="O" onclick="moveCard(this)"><div class="element-symbol">O</div><div class="electron-dots">•••••• (6)</div></div>
        <div class="element-card" data-element="O" onclick="moveCard(this)"><div class="element-symbol">O</div><div class="electron-dots">•••••• (6)</div></div>
        
        <div class="element-card" data-element="Na" onclick="moveCard(this)"><div class="element-symbol">Na</div><div class="electron-dots">• (1)</div></div>
        
        <div class="element-card" data-element="Cl" onclick="moveCard(this)"><div class="element-symbol">Cl</div><div class="electron-dots">••••••• (7)</div></div>
    </div>

    <div class="btn-group">
        <button id="check-btn">화학 결합 검증 실행</button>
        <button id="reset-btn">원소 회수 (초기화)</button>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title" style="color: #2ecc71; margin-top:0;">결합 성공! 🎉</h2>
        <p id="modal-compound" style="font-size: 1.1rem; font-weight: bold; color: #f4d03f; margin: 3px 0;"></p>
        <div id="modal-description"></div>
        <button onclick="closeModal()" style="background-color: #ef476f; color: white; margin-top: 5px; padding: 8px 0; width:100%;">확인</button>
    </div>

    <script>
        const bondZone = document.getElementById('bond-zone');
        const cardContainer = document.getElementById('card-container');
        const checkBtn = document.getElementById('check-btn');
        const resetBtn = document.getElementById('reset-btn');
        const placeholderText = document.getElementById('placeholder-text');
        const scoreView = document.getElementById('score-view');
        const modal = document.getElementById('result-modal');
        const overlay = document.getElementById('modal-overlay');

        let solvedCount = 0;
        const solvedList = new Set(); // 중복 성공 방지

        function moveCard(card) {
            if (card.parentElement === cardContainer) {
                bondZone.appendChild(card);
            } else {
                cardContainer.appendChild(card);
            }
            togglePlaceholder();
        }

        function togglePlaceholder() {
            const currentElements = bondZone.querySelectorAll('.element-card');
            placeholderText.style.display = currentElements.length > 0 ? 'none' : 'block';
        }

        // --- 무적의 9종 결합 마스터 판정 매트릭스 ---
        checkBtn.addEventListener('click', () => {
            const currentCards = Array.from(bondZone.querySelectorAll('.element-card'));
            const elements = currentCards.map(card => card.getAttribute('data-element'));
            const counts = {};
            elements.forEach(el => counts[el] = (counts[el] || 0) + 1);
            const total = elements.length;

            // 1. 소
