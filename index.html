<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUARK: 옥텟 규칙 결합 퍼즐</title>
    <style>
        :root {
            --bg-space: #0b0f19;
            --bg-card: #1e2640;
            --border-neon: #38bdf8;
            --text-main: #f8fafc;
            --accent-green: #10b981;
            --accent-red: #ef4444;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-space) 100%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 헤더 디자인 */
        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
        }

        header p {
            color: #94a3b8;
            font-size: 1rem;
            margin: 0;
        }

        /* 메인 대시보드 구조 */
        .game-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* 1. 결합 존 (실험실 인터페이스 느낌) */
        #bond-zone {
            height: 280px;
            background: rgba(30, 41, 59, 0.7);
            border: 2px dashed rgba(56, 189, 248, 0.4);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
            backdrop-filter: blur(8px);
            box-shadow: inset 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        #bond-zone.drag-over {
            border-color: var(--border-neon);
            background: rgba(56, 189, 248, 0.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .zone-placeholder {
            position: absolute;
            color: #64748b;
            font-size: 1.1rem;
            pointer-events: none;
            text-align: center;
            line-height: 1.6;
            font-weight: 500;
        }

        /* 2. 원소 카드 인벤토리 영역 */
        .inventory-section {
            background: rgba(15, 23, 42, 0.6);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .inventory-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 16px;
            font-weight: 700;
        }

        #card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 16px;
            min-height: 140px;
            align-content: center;
        }
