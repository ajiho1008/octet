<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>옥텟 규칙 원소 결합 퍼즐 (v4.0 대확장 버전)</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-area-color: #162447;
            --accent-purple: #8134af;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.4rem;
            margin: 10px 0 5px 0;
            text-align: center;
            font-weight: bold;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            font-size: 0.85rem;
            color: #b3b3b3;
            margin-bottom: 10px;
            padding: 0 5px;
        }

        #reroll-btn {
            background-color: var(--accent-purple);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            font-weight: bold;
        }

        #info-board {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, #2d142c, #510a32);
            border: 2px solid var(--accent-purple);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        #info-board h2 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            color: #f4d03f;
        }

        #info-board p {
            margin: 0;
            font-size: 0.8rem;
            color: #e0e0e0;
        }

        /* 결합 공간 */
        #bond-zone {
            width: 100%;
            max-width: 400px;
            height: 180px;
            border: 3px dashed var(--accent-purple);
            border-radius: 15px;
            background-color: rgba(22, 36, 71, 0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            position: relative;
            box-sizing: border-box;
            flex-wrap: wrap;
            padding: 10px;
        }

        .zone-placeholder {
            position: absolute;
            color: #75759e;
            font-size: 0.85rem;
            pointer-events: none;
            text-align: center;
            line-height: 1.4;
            z-index: 1;
        }

        /* 원소 카드 보관함 */
        #card-container {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background-color: var(--card-area-color);
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            min-height: 110px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            box-sizing: border-box;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        /* 원소 카드 스타일 */
        .element-card {
            width: 62px;
            height: 82px;
            background-color: #ffffff !important;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 6px 2px;
            cursor: grab;
            user-select: none;
            touch-action: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
            color: #1a1a2e !important;
            position: relative;
        }

        .element-card:active {
            cursor: grabbing;
        }

        .element-symbol {
            font-size: 1.3rem;
            font-weight: bold;
            pointer-events: none; 
        }

        .electron-dots {
            font-size: 0.65rem;
            color: #e74c3c !important;
            font-weight: bold;
